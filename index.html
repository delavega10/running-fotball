<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#ff6a00">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="preconnect" href="https://fonts.googleapis.com">

<title>Fodbold Gold Runner</title>
<style>
html, body { width:100%; height:100%; }
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; }
canvas { display:block; }
#ui { position:fixed; top:0; left:0; right:0; bottom:0; width:100%; height:100%; pointer-events:none; font-family:'Fredoka One','Segoe UI',Arial,sans-serif; z-index:10; }

/* Gold coin score badge */
#score {
  position:absolute; top:14px; left:50%; transform:translateX(-50%);
  background:linear-gradient(180deg,#FFE566 0%,#FFA500 100%);
  color:#7a3800; font-size:26px;
  padding:8px 26px 8px 18px; border-radius:50px; letter-spacing:1px;
  text-shadow:0 1px 0 rgba(255,255,255,0.4);
  box-shadow:0 5px 0 #c47000, 0 8px 20px rgba(180,90,0,0.5), inset 0 1px 0 rgba(255,255,255,0.35);
  border:2px solid #FFE87A;
  transition:transform 0.12s;
}

#controls {
  position:absolute; bottom:14px; left:50%; transform:translateX(-50%);
  color:rgba(255,230,180,0.65); font-size:12px; text-align:center;
  text-shadow:0 1px 3px rgba(0,0,0,0.6);
}

#goal-flash {
  position:absolute; top:0; left:0; right:0; bottom:0; background:rgba(255,215,0,0); pointer-events:none;
  transition:background 0.1s;
}

/* Golden speed lines */
#speed-lines {
  position:absolute; top:0; left:0; right:0; bottom:0; pointer-events:none; opacity:0;
  background:
    repeating-linear-gradient(
      -14deg,
      rgba(255,220,60,0.2) 0px,
      rgba(255,220,60,0.2) 3px,
      rgba(255,220,60,0.00) 3px,
      rgba(255,220,60,0.00) 24px
    );
  mix-blend-mode:screen;
  transition:opacity 0.2s;
}

/* Goal text - gold burst */
#goal-text {
  position:absolute; top:28%; left:50%; transform:translateX(-50%) scale(1);
  color:#FFD700; font-size:72px;
  text-shadow:0 0 30px #ff6600, 0 0 60px rgba(255,150,0,0.5), 0 4px 0 #B8860B, 0 6px 14px rgba(0,0,0,0.4);
  opacity:0; pointer-events:none; transition:opacity 0.25s, transform 0.25s;
  letter-spacing:4px;
}

/* Game Over overlay */
#overlay {
  display:none; position:absolute; top:0; left:0; right:0; bottom:0;
  background:linear-gradient(180deg,rgba(8,0,25,0.96) 0%,rgba(70,15,0,0.96) 100%);
  justify-content:center; align-items:center;
  flex-direction:column; pointer-events:all;
}
#overlay.show { display:flex; }
#overlay h1 {
  color:#FFD700; font-size:72px; margin-bottom:6px;
  text-shadow:0 4px 0 #B8860B, 0 8px 28px rgba(255,140,0,0.45);
  letter-spacing:4px;
}
#overlay .sub {
  color:#fff; font-size:28px; margin-bottom:36px;
  text-shadow:0 2px 8px rgba(0,0,0,0.5);
}

/* Orange/gold Tom-style buttons */
#overlay button, #start-screen button {
  background:linear-gradient(180deg,#ffaa00 0%,#ff5500 100%);
  color:#fff; font-size:26px;
  padding:17px 64px; border:none; border-radius:50px; cursor:pointer;
  box-shadow:0 6px 0 #aa3300, 0 10px 28px rgba(255,70,0,0.4);
  text-shadow:0 2px 5px rgba(0,0,0,0.35);
  transition:transform 0.1s, box-shadow 0.1s;
  letter-spacing:1px;
}
#overlay button:active, #start-screen button:active {
  transform:translateY(4px);
  box-shadow:0 2px 0 #aa3300, 0 4px 14px rgba(255,70,0,0.35);
}

/* Start screen - Tom Run Gold style */
#start-screen {
  position:absolute; top:0; left:0; right:0; bottom:0;
  background:linear-gradient(180deg, #0d0b2b 0%, #1e1470 28%, #9b35d4 62%, #ff6a00 100%);
  display:flex; flex-direction:column; justify-content:center; align-items:center;
  pointer-events:all; gap:5px;
}
#start-screen::after {
  content:''; position:absolute; bottom:0; left:0; right:0; height:42%;
  background:linear-gradient(0deg,rgba(255,100,0,0.28),transparent);
  pointer-events:none;
}
.start-label {
  font-size:13px; color:#FFD700; text-transform:uppercase; letter-spacing:5px;
  text-shadow:0 2px 10px rgba(0,0,0,0.5); z-index:1;
}
#start-screen h1 {
  color:#fff; font-size:58px;
  text-shadow:0 4px 0 #cc4400, 0 8px 28px rgba(255,80,0,0.55);
  letter-spacing:2px; z-index:1; text-align:center; line-height:1.1;
}
.start-emoji { font-size:86px; margin:6px 0; z-index:1; filter:drop-shadow(0 4px 14px rgba(255,140,0,0.65)); }
#start-screen p {
  color:rgba(255,220,160,0.88); font-size:14px; z-index:1;
  text-shadow:0 1px 4px rgba(0,0,0,0.55);
}
</style>
</head>

  <div id="speed-lines"></div>

<script>
const LANES   = [-2.2, 0, 2.2];

let speed = 13;

let jumpY = 0, jumpVY = 0, grounded = true, ducking = false;
let platformY = 0;

let gradMap;
let crowdFans = [], wavingFlags = [], pulseBoards = [];

const PLAYER_BASE_SCALE = 0.64;

// ── GLOW / PARTICLE SYSTEM ─────────────────────────────────────────────────
const pickupParticles = [];
let glowTexGold, glowTexWhite, glowTexGreen;
let maalTex = null;

function makeGlowTex(r, g, b) {
  const c = document.createElement('canvas'); c.width=64; c.height=64;
  const ctx = c.getContext('2d');
  const gr = ctx.createRadialGradient(32,32,1,32,32,32);
  gr.addColorStop(0,    `rgba(${r},${g},${b},1)`);
  gr.addColorStop(0.45, `rgba(${r},${g},${b},0.4)`);
  gr.addColorStop(1,    'rgba(0,0,0,0)');
  ctx.fillStyle = gr; ctx.fillRect(0,0,64,64);
  return new THREE.CanvasTexture(c);
}

function spawnPickupBurst(x, y, z, tex, count) {
  for (let i=0; i<count; i++) {
    const sp = new THREE.Sprite(new THREE.SpriteMaterial({
      map:tex, transparent:true, blending:THREE.AdditiveBlending, depthWrite:false
    }));
    const spd = 3.5 + Math.random()*4.5;
    const ang = (i/count)*Math.PI*2 + Math.random()*0.5;
    const elev = (0.3 + Math.random()*0.7)*Math.PI/2;
    sp.position.set(x, y, z);
    sp.userData.vx = Math.cos(ang)*Math.cos(elev)*spd;
    sp.userData.vy = Math.sin(elev)*spd + 2;
    sp.userData.vz = Math.sin(ang)*Math.cos(elev)*spd;
    sp.userData.life = 1;
    sp.userData.dur  = 0.3 + Math.random()*0.35;
    const sz = 0.3 + Math.random()*0.45;
    sp.scale.set(sz, sz, 1);
    scene.add(sp); pickupParticles.push(sp);
  }
}

function makeMaalTex() {
  const c = document.createElement('canvas'); c.width=512; c.height=192;
  const ctx = c.getContext('2d');
  // Dark LED board
  ctx.fillStyle = '#06080f';
  ctx.fillRect(0,0,512,192);
  // Gold glow center
  const grd = ctx.createRadialGradient(256,96,20,256,96,160);
  grd.addColorStop(0,'rgba(255,200,0,0.35)'); grd.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=grd; ctx.fillRect(0,0,512,192);
  // Orange shadow offset
  ctx.font = 'bold 120px Arial Black, Arial';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillStyle='#bb4400'; ctx.fillText('MÅL!', 258, 100);
  // Gold main text
  ctx.fillStyle='#FFD700'; ctx.fillText('MÅL!', 256, 96);
  // White highlight on letters
  ctx.fillStyle='rgba(255,255,255,0.25)'; ctx.fillText('MÅL!', 256, 88);
  // Corner gold dots (LED frame)
  [[18,18],[494,18],[18,174],[494,174]].forEach(([x,y]) => {
    ctx.beginPath(); ctx.arc(x,y,7,0,Math.PI*2);
    ctx.fillStyle='#FFD700'; ctx.fill();
  });
  // Side star decorations
  ctx.font='32px Arial'; ctx.fillStyle='#FFD700';
  ctx.fillText('★',40,96); ctx.fillText('★',472,96);
  return new THREE.CanvasTexture(c);
}

function updatePickupParticles(dt) {
  for (let i=pickupParticles.length-1; i>=0; i--) {
    const p = pickupParticles[i];
    p.userData.life -= dt / p.userData.dur;
    if (p.userData.life <= 0) { scene.remove(p); pickupParticles.splice(i,1); continue; }
    p.position.x += p.userData.vx * dt;
    p.position.y += p.userData.vy * dt;
    p.position.z += p.userData.vz * dt;
    p.userData.vy -= 16 * dt;
    p.material.opacity = p.userData.life;
    const s = p.userData.life * 0.5 + 0.12;
    p.scale.set(s, s, 1);
  }
}
let skyCtx = null, skyTex = null;
let skyTopCol = new THREE.Color(0x1855a0);
let skyMidCol = new THREE.Color(0x4090e0);
let skyBotCol = new THREE.Color(0x90c4f0);
const groundThemeMats = { grassDark:null, grassLight:null, side:null };
const themeVisuals = {
  stand: [], barrierBlue: [], barrierOrange: [], crowdRibbon: [],
  crowdBody: [], ad: [], bush: [], backdrop: [], tunnel: [],
  boardScreen: [], flood: []
};
const themeScratch = { a:new THREE.Color(), b:new THREE.Color(), c:new THREE.Color() };
const THEMES = [
  {
    at:0, clear:0x4a90e2, fog:0x62aaf0, ambient:0xeef8ff, ambientI:0.55, sun:0xfff8e0, sunI:0.60,
    grassDark:0x26b845, grassLight:0x44d462, side:0xe8e4d0, stand:0x4a72b8,
    barrierBlue:0x2e7de0, barrierOrange:0xff7a20, crowdTint:0xffffff, ad:0xffffff, bush:0x28c842,
    backdrop:0x8ab0d8, tunnel:0x1e3460, boardScreen:0x50d060, flood:0xe0eeff,
    skyTop:0x1855a0, skyMid:0x4090e0, skyBot:0x90c4f0
  },
  {
    at:320, clear:0x5f577d, fog:0x6a6889, ambient:0xe6ccbb, ambientI:0.40, sun:0xffc09c, sunI:0.52,
    grassDark:0x3c9750, grassLight:0x56b86b, side:0xcabfb8, stand:0x5d5b7f,
    barrierBlue:0x5b7bd2, barrierOrange:0xff8e4f, crowdTint:0xfff1d6, ad:0xffc38f, bush:0x4ea45f,
    backdrop:0xb39bc1, tunnel:0x3c365d, boardScreen:0xe29d4a, flood:0xffdcbf,
    skyTop:0x5c355f, skyMid:0xbf6d5f, skyBot:0xe9ad7f
  },
  {
    at:760, clear:0x1f2f52, fog:0x2f4268, ambient:0x9fb8d8, ambientI:0.32, sun:0x9cc3ff, sunI:0.35,
    grassDark:0x1f7a42, grassLight:0x2f9653, side:0x7f8da8, stand:0x2e3f66,
    barrierBlue:0x3e63b8, barrierOrange:0xd7703e, crowdTint:0xbfd8ff, ad:0x94b7ff, bush:0x2f8852,
    backdrop:0x657ca5, tunnel:0x1c2a49, boardScreen:0x72d0d9, flood:0xb9d0ff,
    skyTop:0x122347, skyMid:0x2d4b79, skyBot:0x4f74a8
  },
  {
    at:1280, clear:0x2a1f5d, fog:0x3a2f73, ambient:0xdfb8ff, ambientI:0.38, sun:0xff9dff, sunI:0.44,
    grassDark:0x1f8a52, grassLight:0x2fbf74, side:0x9b8fc9, stand:0x4d3e86,
    barrierBlue:0x6b74ff, barrierOrange:0xff6db2, crowdTint:0xffb5ff, ad:0xff86df, bush:0x29a166,
    backdrop:0x7d68bc, tunnel:0x392a72, boardScreen:0x8eff7d, flood:0xffb7ff,
    skyTop:0x29143d, skyMid:0x4b2f7e, skyBot:0x7b55b2
  }
];

function toon(color, opts) {
  const m = new THREE.MeshToonMaterial(Object.assign({ color:color, gradientMap:gradMap }, opts||{}));
  return m;
}
function toonDS(color) { return toon(color, { side:THREE.DoubleSide }); }

function createCrowdTexture() {
  const c = document.createElement('canvas');
  c.width = 512; c.height = 128;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#3f5fa3';
  ctx.fillRect(0, 0, c.width, c.height);
  const shirt = ['#ff4d4d','#3b82f6','#facc15','#22c55e','#f97316','#e879f9','#06b6d4','#fb7185','#6366f1','#ffa500'];
  for (let row = 0; row < 4; row++) {
    for (let i = 0; i < 86; i++) {
      const x = 6 + i * 6 + (row % 2 ? 2 : 0);
      const y = 18 + row * 26;
      ctx.fillStyle = shirt[(i + row * 3) % shirt.length];
      ctx.fillRect(x, y + 8, 4, 8);
      ctx.fillStyle = '#ffcc88';
      ctx.beginPath();
      ctx.arc(x + 2, y + 5, 2, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  const tx = new THREE.CanvasTexture(c);
  tx.wrapS = THREE.RepeatWrapping;
  tx.repeat.set(2.2, 1);
  return tx;
}

function getThemeByDistance(dist) {
  let idx = 0;
  for (let i = 1; i < THEMES.length; i++) {
    if (dist >= THEMES[i].at) idx = i;
  }
  return THEMES[idx];
}

function lerpMatColor(mat, targetHex, t) {
  if (!mat || !mat.color) return;
  themeScratch.a.setHex(targetHex);
  mat.color.lerp(themeScratch.a, t);
}

function redrawSkyGradient() {
  if (!skyCtx || !skyTex) return;
  const grad = skyCtx.createLinearGradient(0, 0, 0, 256);
  grad.addColorStop(0.0, '#' + skyTopCol.getHexString());
  grad.addColorStop(0.58, '#' + skyMidCol.getHexString());
  grad.addColorStop(1.0, '#' + skyBotCol.getHexString());
  skyCtx.fillStyle = grad;
  skyCtx.fillRect(0, 0, 256, 256);
  skyTex.needsUpdate = true;
}

function applyThemeProgression(dt) {
  const target = getThemeByDistance(worldZ);
  const t = Math.min(1, dt * 1.55);

  renderer.getClearColor(themeScratch.a);
  themeScratch.b.setHex(target.clear);
  themeScratch.a.lerp(themeScratch.b, t);
  renderer.setClearColor(themeScratch.a);

  themeScratch.b.setHex(target.fog);
  scene.fog.color.lerp(themeScratch.b, t);
  scene.fog.near += (42 - scene.fog.near) * t * 0.2;
  scene.fog.far += (102 - scene.fog.far) * t * 0.2;

  if (ambientLightRef) {
    themeScratch.b.setHex(target.ambient);
    ambientLightRef.color.lerp(themeScratch.b, t);
    ambientLightRef.intensity += (target.ambientI - ambientLightRef.intensity) * t;
  }
  if (sunLightRef) {
    themeScratch.b.setHex(target.sun);
    sunLightRef.color.lerp(themeScratch.b, t);
    sunLightRef.intensity += (target.sunI - sunLightRef.intensity) * t;
  }

  if (groundThemeMats.grassDark) lerpMatColor(groundThemeMats.grassDark, target.grassDark, t);
  if (groundThemeMats.grassLight) lerpMatColor(groundThemeMats.grassLight, target.grassLight, t);
  if (groundThemeMats.side) lerpMatColor(groundThemeMats.side, target.side, t);

  for (const m of themeVisuals.stand) lerpMatColor(m, target.stand, t);
  for (const m of themeVisuals.barrierBlue) lerpMatColor(m, target.barrierBlue, t);
  for (const m of themeVisuals.barrierOrange) lerpMatColor(m, target.barrierOrange, t);
  for (const m of themeVisuals.crowdRibbon) lerpMatColor(m, target.crowdTint, t);
  for (const m of themeVisuals.crowdBody) lerpMatColor(m, target.crowdTint, t * 0.45);
  for (const m of themeVisuals.ad) lerpMatColor(m, target.ad, t * 0.5);
  for (const m of themeVisuals.bush) lerpMatColor(m, target.bush, t);
  for (const m of themeVisuals.backdrop) lerpMatColor(m, target.backdrop, t);
  for (const m of themeVisuals.tunnel) lerpMatColor(m, target.tunnel, t);
  for (const m of themeVisuals.boardScreen) lerpMatColor(m, target.boardScreen, t);
  for (const m of themeVisuals.flood) lerpMatColor(m, target.flood, t);

  themeScratch.b.setHex(target.skyTop); skyTopCol.lerp(themeScratch.b, t);
  themeScratch.b.setHex(target.skyMid); skyMidCol.lerp(themeScratch.b, t);
  themeScratch.b.setHex(target.skyBot); skyBotCol.lerp(themeScratch.b, t);
  redrawSkyGradient();
}

function init() {
  const data = new Uint8Array([90,90,90, 170,170,170, 255,255,255]);
  gradMap = new THREE.DataTexture(data, 3, 1, THREE.RGBFormat);
  gradMap.minFilter = THREE.NearestFilter;
  gradMap.magFilter = THREE.NearestFilter;
  gradMap.needsUpdate = true;
  crowdTex = createCrowdTexture();
  glowTexGold  = makeGlowTex(255, 200,  50);
  glowTexWhite = makeGlowTex(200, 230, 255);
  glowTexGreen = makeGlowTex(100, 255, 130);
  maalTex      = makeMaalTex();

  renderer = new THREE.WebGLRenderer({ antialias:true });
  renderer.setSize(innerWidth, innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setClearColor(0x4a90e2);
  renderer.shadowMap.enabled = true;
  document.body.insertBefore(renderer.domElement, document.getElementById('ui'));

  scene = new THREE.Scene();
  scene.fog = new THREE.Fog(0x62aaf0, 42, 102);

  cam = new THREE.PerspectiveCamera(62, innerWidth/innerHeight, 0.1, 130);
  resetCam();

  ambientLightRef = new THREE.AmbientLight(0xcfe0ff, 0.45);
  scene.add(ambientLightRef);
  sunLightRef = new THREE.DirectionalLight(0xfff1d6, 0.48);
  sunLightRef.position.set(5, 14, 8); sunLightRef.castShadow = true;
  sunLightRef.shadow.mapSize.set(1024, 1024);
  sunLightRef.shadow.camera.near=0.5; sunLightRef.shadow.camera.far=60;
  sunLightRef.shadow.camera.left=-15; sunLightRef.shadow.camera.right=15;
  sunLightRef.shadow.camera.top=15; sunLightRef.shadow.camera.bottom=-15;
  sunLightRef.shadow.bias=-0.002;
  scene.add(sunLightRef);

  buildGround();
  buildSideScenery();
  buildSkyDeco();
  buildScrollingGoals();
  buildStadiumBackdrop();

  playerGroup = buildPlayer();
  playerGroup.position.set(LANES[1], GY, PZ);
  playerGroup.scale.set(PLAYER_BASE_SCALE, PLAYER_BASE_SCALE, PLAYER_BASE_SCALE);
  scene.add(playerGroup);

  addEventListener('resize', onResize);
  document.addEventListener('keydown', onKey);
  let ty0=0, tx0=0;
  addEventListener('touchstart', e=>{ ty0=e.touches[0].clientY; tx0=e.touches[0].clientX; });
  addEventListener('touchend', e=>{
    const dy=e.changedTouches[0].clientY-ty0, dx=e.changedTouches[0].clientX-tx0;
    if (Math.abs(dx)>Math.abs(dy)) { dx<-30?shiftLane(-1):shiftLane(1); }
    else { dy<-30?doJump():doDuck(); }
  });

  renderer.render(scene, cam);
}

function resetCam() {
  cam.position.set(0, 5.35, 12.1);
  cam.lookAt(0, 1.2, -10);
}

function buildGround() {
  const grassDark  = toon(0x26b845);
  const grassLight = toon(0x44d462);
  const sideMat    = toon(0xb8ae98);
  groundThemeMats.grassDark  = grassDark;
  groundThemeMats.grassLight = grassLight;
  groundThemeMats.side       = sideMat;

  const lineMat   = new THREE.MeshBasicMaterial({ color:0xffffff });
  const goldMat   = new THREE.MeshBasicMaterial({ color:0xFFD700, transparent:true, opacity:0.9 });
  const edgeMat   = new THREE.MeshBasicMaterial({ color:0xffffff, transparent:true, opacity:0.8 });
  const dimLineMat= new THREE.MeshBasicMaterial({ color:0xffffff, transparent:true, opacity:0.45 });

  for (let i=0; i<TILE_CNT; i++) {
    const zPos = PZ - i * TILE_LEN;

    // Base grass tile
    const t = new THREE.Mesh(new THREE.PlaneGeometry(7.4, TILE_LEN), grassDark);
    t.rotation.x = -Math.PI/2;
    t.position.set(0, GY-0.01, zPos);
    t.receiveShadow = true;
    scene.add(t); gTiles.push(t);

    // Alternating stripes — classic football pitch checkerboard
    for (let s=0; s<6; s++) {
      const stripe = new THREE.Mesh(
        new THREE.PlaneGeometry(7.4, TILE_LEN/6),
        (s+i)%2===0 ? grassLight : grassDark
      );
      stripe.rotation.x = -Math.PI/2;
      stripe.position.set(0, GY-0.005, zPos - TILE_LEN/2 + (s+0.5)*(TILE_LEN/6));
      scene.add(stripe);
    }

    // Side paving
    [-5.8, 5.8].forEach(x => {
      const side = new THREE.Mesh(new THREE.PlaneGeometry(4.6, TILE_LEN), sideMat);
      side.rotation.x = -Math.PI/2;
      side.position.set(x, GY-0.02, zPos);
      side.receiveShadow = true;
      scene.add(side);
    });

    // Outer pitch boundary lines (thicker)
    [-3.7, 3.7].forEach(x => {
      const ol = new THREE.Mesh(new THREE.PlaneGeometry(0.2, TILE_LEN), edgeMat);
      ol.rotation.x = -Math.PI/2;
      ol.position.set(x, GY+0.016, zPos);
      scene.add(ol);
    });

    // Lane divider lines
    [-1.1, 1.1].forEach(x => {
      const l = new THREE.Mesh(new THREE.PlaneGeometry(0.13, TILE_LEN), lineMat);
      l.rotation.x = -Math.PI/2;
      l.position.set(x, GY+0.012, zPos);
      scene.add(l);
    });

    // GOLD center dashes (Tom Run Gold style)
    for (let d=0; d<5; d++) {
      const dash = new THREE.Mesh(new THREE.PlaneGeometry(0.15, 2.8), goldMat);
      dash.rotation.x = -Math.PI/2;
      dash.position.set(0, GY+0.022, zPos - d*(TILE_LEN/5) + TILE_LEN/2 - TILE_LEN/10);
      scene.add(dash);
    }

    // Subtle lane shadow overlays (gives depth to each lane)
    [-2.2, 2.2].forEach(x => {
      const shadow = new THREE.Mesh(
        new THREE.PlaneGeometry(2.1, TILE_LEN),
        new THREE.MeshBasicMaterial({color:0x000000, transparent:true, opacity:0.06, depthWrite:false})
      );
      shadow.rotation.x = -Math.PI/2;
      shadow.position.set(x, GY+0.008, zPos);
      scene.add(shadow);
    });

    // Cross-lines every half tile (feel of forward movement)
    for (let cl=0; cl<2; cl++) {
      const crossZ = zPos - cl*(TILE_LEN/2) + TILE_LEN/4;
      const cross = new THREE.Mesh(new THREE.PlaneGeometry(7.4, 0.08), dimLineMat);
      cross.rotation.x = -Math.PI/2;
      cross.position.set(0, GY+0.011, crossZ);
      scene.add(cross);
    }
  }
}

function buildSideScenery() {
  for (let i=0;i<TILE_CNT;i++){
    const lg=new THREE.Group(); lg.position.z=PZ-i*TILE_LEN;
    const rg=new THREE.Group(); rg.position.z=PZ-i*TILE_LEN;
    fillSide(lg,-1); fillSide(rg,1);
    scene.add(lg); scene.add(rg);
    sideTiles.L.push(lg); sideTiles.R.push(rg);
  }
}

const rng=(a,b)=>a+Math.random()*(b-a);
const ri=(a,b)=>Math.floor(rng(a,b+1));

function fillSide(g, side) {
  const bx = side * 5.45;
  const sx = bx + side * 4.8; // stand center x

  // ── PITCH BARRIER WALL ────────────────────────────────────────────────
  const barrierBlue = new THREE.Mesh(new THREE.BoxGeometry(0.32, 1.05, TILE_LEN), toon(0x1e5ed1));
  barrierBlue.position.set(bx + side*0.06, GY+0.525, 0);
  themeVisuals.barrierBlue.push(barrierBlue.material);
  g.add(barrierBlue);
  const barrierTop = new THREE.Mesh(new THREE.BoxGeometry(0.34, 0.14, TILE_LEN), toon(0xff7700));
  barrierTop.position.set(bx + side*0.06, GY+1.0, 0);
  themeVisuals.barrierOrange.push(barrierTop.material);
  g.add(barrierTop);

  // ── LED ADVERTISING BOARDS (pitch level) ─────────────────────────────
  const adPalette = [0xff2222, 0xFFD700, 0x2255ee, 0xff7700, 0x22cc55];
  const boardCount = 5;
  const boardW = (TILE_LEN - 0.5) / boardCount;
  for (let b=0; b<boardCount; b++) {
    const boardZ = -TILE_LEN/2 + 0.25 + b*boardW + boardW/2;
    const col = adPalette[b % adPalette.length];
    const board = new THREE.Mesh(
      new THREE.BoxGeometry(boardW - 0.12, 0.85, 0.13),
      toon(col)
    );
    board.position.set(bx + side*0.12, GY+0.47, boardZ);
    board.userData.baseScaleY = board.scale.y;
    board.userData.phase = b*0.9 + Math.random()*0.6;
    pulseBoards.push(board);
    themeVisuals.ad.push(board.material);
    g.add(board);
    // Gold bottom trim
    const trim = new THREE.Mesh(
      new THREE.BoxGeometry(boardW - 0.12, 0.08, 0.14),
      toon(0xFFD700)
    );
    trim.position.set(bx + side*0.12, GY+0.06, boardZ);
    g.add(trim);
  }

  // ── MAIN STAND BODY (large, clean, vivid stadium blue) ────────────────
  const standCol = 0x1a4faa;
  const standW = 9.8, standH = 7.0;
  const standBody = new THREE.Mesh(
    new THREE.BoxGeometry(standW, standH, TILE_LEN),
    toon(standCol)
  );
  standBody.position.set(sx, GY + standH/2, 0);
  standBody.receiveShadow = true;
  themeVisuals.stand.push(standBody.material);
  g.add(standBody);

  // ── SEAT ROWS — thin horizontal lines (slightly darker) ───────────────
  const rowCol = 0x0d3a8f;
  for (let row=0; row<10; row++) {
    const rowY = GY + 0.6 + row * (standH * 0.88 / 10);
    const rowLine = new THREE.Mesh(
      new THREE.BoxGeometry(standW + 0.02, 0.06, TILE_LEN + 0.02),
      toon(rowCol)
    );
    rowLine.position.set(sx, rowY, 0);
    g.add(rowLine);
  }

  // ── THREE VIVID ACCENT BANDS at base of stand ─────────────────────────
  const accentColors = [0xdd2233, 0xFFD700, 0x2244ee];
  const secLen = TILE_LEN / 3;
  accentColors.forEach((col, i) => {
    const band = new THREE.Mesh(
      new THREE.BoxGeometry(standW, 0.55, secLen - 0.12),
      toon(col)
    );
    band.position.set(sx, GY + 0.28, -TILE_LEN/2 + i*secLen + secLen/2);
    g.add(band);
  });

  // ── WHITE TOP STRIPE + GOLD TRIM ──────────────────────────────────────
  const topStripe = new THREE.Mesh(
    new THREE.BoxGeometry(standW, 0.38, TILE_LEN + 0.1),
    toon(0xffffff)
  );
  topStripe.position.set(sx, GY + standH + 0.19, 0);
  g.add(topStripe);
  const goldTrim = new THREE.Mesh(
    new THREE.BoxGeometry(standW, 0.15, TILE_LEN + 0.1),
    toon(0xFFD700)
  );
  goldTrim.position.set(sx, GY + standH + 0.52, 0);
  g.add(goldTrim);

  // ── ROOF CANOPY (flat overhang toward pitch) ───────────────────────────
  const canopyX = sx - side * (standW * 0.5 - 0.1);
  const canopy = new THREE.Mesh(
    new THREE.BoxGeometry(3.2, 0.18, TILE_LEN + 0.2),
    toon(0xf0f0f0)
  );
  canopy.position.set(canopyX - side*1.6, GY + standH + 0.58, 0);
  g.add(canopy);
  // Canopy underside shadow strip
  const canopyEdge = new THREE.Mesh(
    new THREE.BoxGeometry(3.2, 0.09, TILE_LEN + 0.2),
    toon(0xd0d8e0)
  );
  canopyEdge.position.set(canopyX - side*1.6, GY + standH + 0.48, 0);
  g.add(canopyEdge);

  // ── TWO WHITE COLUMNS with gold sphere caps ───────────────────────────
  const colX = bx + side*0.72;
  [-TILE_LEN/4, TILE_LEN/4].forEach(cz => {
    const col = new THREE.Mesh(
      new THREE.CylinderGeometry(0.14, 0.16, standH + 0.6, 10),
      toon(0xfafafa)
    );
    col.position.set(colX, GY + (standH+0.6)/2, cz);
    g.add(col);
    const cap = new THREE.Mesh(
      new THREE.SphereGeometry(0.22, 10, 8),
      toon(0xFFD700)
    );
    cap.position.set(colX, GY + standH + 0.6, cz);
    g.add(cap);
  });

  // ── TWO ROUND TOM GOLD RUN-STYLE TREES ───────────────────────────────
  const treePositions = [
    [bx + side*1.5, -TILE_LEN/3],
    [bx + side*1.5,  TILE_LEN/3],
  ];
  treePositions.forEach(([tx, tz]) => {
    // Trunk
    const trunk = new THREE.Mesh(
      new THREE.CylinderGeometry(0.12, 0.16, 1.6, 8),
      toon(0x7a5230)
    );
    trunk.position.set(tx, GY+0.8, tz);
    g.add(trunk);
    // 4 overlapping spheres for fluffy canopy
    const leafCol = 0x2cb84a;
    const offsets = [[0,0,0],[0.28,0.22,0],[-0.28,0.18,0],[0,0.12,0.28]];
    offsets.forEach(([ox,oy,oz]) => {
      const leaf = new THREE.Mesh(
        new THREE.SphereGeometry(0.52 + rng(0,0.14), 9, 7),
        toon(leafCol)
      );
      leaf.position.set(tx+ox, GY+2.0+oy, tz+oz);
      themeVisuals.bush.push(leaf.material);
      g.add(leaf);
    });
  });

  // ── MÅL! BANNER ───────────────────────────────────────────────────────
  const maalBx = colX;
  const maalFrame = new THREE.Mesh(
    new THREE.BoxGeometry(TILE_LEN*0.58 + 0.3, 1.55, 0.16),
    toon(0x111122)
  );
  maalFrame.position.set(sx - side*1.5, GY+4.8, 0);
  g.add(maalFrame);
  const maalBoard = new THREE.Mesh(
    new THREE.PlaneGeometry(TILE_LEN*0.58, 1.3),
    new THREE.MeshBasicMaterial({ map:maalTex, side:THREE.DoubleSide, transparent:false })
  );
  maalBoard.rotation.y = -side * Math.PI/2;
  maalBoard.position.set(sx - side*1.5, GY+4.8, 0);
  g.add(maalBoard);
  [[0, 0.78],[0,-0.78]].forEach(([_,dy]) => {
    const ft = new THREE.Mesh(
      new THREE.BoxGeometry(TILE_LEN*0.58+0.28, 0.09, 0.18),
      toon(0xFFD700)
    );
    ft.position.set(sx - side*1.5, GY+4.8+dy, 0);
    g.add(ft);
  });

  // ── 3 WAVING FLAGS ────────────────────────────────────────────────────
  const flagPalette=[0xff3333,0xFFD700,0x2244ee,0xffffff,0x33cc55];
  [-TILE_LEN/2+2.5, 0, TILE_LEN/2-2.5].forEach((poleZ, fi) => {
    const pole = new THREE.Mesh(
      new THREE.CylinderGeometry(0.048, 0.048, 5.8, 6),
      toon(0xcccccc)
    );
    pole.position.set(sx - side*3.5, GY+2.9, poleZ);
    g.add(pole);
    const flagCol = flagPalette[fi % flagPalette.length];
    const flag = new THREE.Mesh(
      new THREE.PlaneGeometry(1.4, 0.75),
      toonDS(flagCol)
    );
    flag.position.set(pole.position.x + side*0.7, pole.position.y+1.7, poleZ);
    flag.userData.phase = fi * 1.1 + Math.random()*Math.PI;
    flag.userData.side  = side;
    wavingFlags.push(flag);
    g.add(flag);
  });

  // ── CROWD TEXTURE RIBBON (positioned at inner face of stand) ─────────
  const ribbonX = sx - side * (standW/2 + 0.10);
  const crowdRibbon = new THREE.Mesh(
    new THREE.PlaneGeometry(TILE_LEN - 0.6, 3.8),
    new THREE.MeshBasicMaterial({ map:crowdTex, side:THREE.DoubleSide })
  );
  crowdRibbon.rotation.y = side * Math.PI/2;
  crowdRibbon.position.set(ribbonX, GY+2.3, 0);
  themeVisuals.crowdRibbon.push(crowdRibbon.material);
  g.add(crowdRibbon);

  // ── COLORED FAN SECTION BLOCKS on inner stand face ────────────────────
  // Bold color-block sections like real football stands: red/gold/blue/green
  const fanSecCols = [0xdd2222, 0xFFD700, 0x1a88ee, 0x22bb44];
  const secW = (TILE_LEN - 0.8) / fanSecCols.length;
  fanSecCols.forEach((col, i) => {
    for (let row = 0; row < 3; row++) {
      const sec = new THREE.Mesh(
        new THREE.BoxGeometry(0.07, 1.05, secW - 0.18),
        toon(col)
      );
      sec.position.set(
        sx - side*(standW/2 + 0.04),
        GY + 0.6 + row * 1.5,
        -TILE_LEN/2 + 0.4 + i*secW + secW/2
      );
      g.add(sec);
    }

  // ── SIMPLE FLOODLIGHT POLES ───────────────────────────────────────────
  [TILE_LEN/2 - 1.2, -TILE_LEN/2 + 1.2].forEach(fz => {
    const mast = new THREE.Mesh(
      new THREE.CylinderGeometry(0.09, 0.13, 9.5, 8),
      toon(0x8898a8)
    );
    mast.position.set(sx - side*3.8, GY+4.75, fz);
    g.add(mast);
    // Lamp head (no cone beam — clean silhouette)
    const lamp = new THREE.Mesh(
      new THREE.BoxGeometry(1.3, 0.32, 0.55),
      toon(0xaabbcc)
    );
    lamp.position.set(sx - side*3.8, GY+9.2, fz);
    themeVisuals.flood.push(lamp.material);
    g.add(lamp);
    const lens = new THREE.Mesh(
      new THREE.BoxGeometry(1.1, 0.16, 0.12),
      new THREE.MeshBasicMaterial({color:0xfffde8})
    );
    lens.position.set(sx - side*3.8, GY+9.2, fz);
    g.add(lens);
  });
}

function makeGoalMesh(x) {
  const g = new THREE.Group();
  const ph=1.65, pw=2.1;
  const postMat = toon(0xf4f4f4);

  // Posts (rounded cylinders)
  [-pw/2, pw/2].forEach(px => {
    const post = new THREE.Mesh(new THREE.CylinderGeometry(0.08,0.08,ph,10), postMat);
    post.position.set(px, ph/2, 0); g.add(post);
    // Base
    const base = new THREE.Mesh(new THREE.CylinderGeometry(0.12,0.15,0.1,8), toon(0x444455));
    base.position.set(px,0.05,0); g.add(base);
  });
  // Crossbar
  const bar = new THREE.Mesh(new THREE.CylinderGeometry(0.08,0.08,pw+0.18,10), postMat);
  bar.rotation.z = Math.PI/2; bar.position.set(0,ph,0); g.add(bar);

  // Net back + sides
  const netMat = new THREE.MeshBasicMaterial({color:0xffffff,opacity:0.28,transparent:true,side:THREE.DoubleSide});
  const netBack = new THREE.Mesh(new THREE.PlaneGeometry(pw,ph), netMat);
  netBack.position.set(0, ph/2, 0.28); g.add(netBack);
  // Vertical net lines
  for (let i=-3; i<=3; i++) {
    const vl = new THREE.Mesh(new THREE.PlaneGeometry(0.04,ph),
      new THREE.MeshBasicMaterial({color:0xffffff,opacity:0.3,transparent:true,side:THREE.DoubleSide}));
    vl.position.set(i*(pw/6), ph/2, 0.55); g.add(vl);
  }
  // Horizontal net lines
  for (let i=0; i<5; i++) {
    const hl = new THREE.Mesh(new THREE.PlaneGeometry(pw, 0.04),
      new THREE.MeshBasicMaterial({color:0xffffff,opacity:0.3,transparent:true,side:THREE.DoubleSide}));
    hl.position.set(0, (i+0.5)*(ph/5), 0.55); g.add(hl);
  }
  // Goal blue glow fill
  const glowFill = new THREE.Mesh(new THREE.PlaneGeometry(pw,ph),
    new THREE.MeshBasicMaterial({color:0x4488ff,transparent:true,opacity:0.07,depthWrite:false,side:THREE.DoubleSide}));
  glowFill.position.set(0,ph/2,0.18); g.add(glowFill);

  g.position.x = x;
  return g;
}

function buildSkyDeco() {
  // Sky gradient dome
  const skyCanvas = document.createElement('canvas');
  skyCanvas.width = 256; skyCanvas.height = 256;
  skyCtx = skyCanvas.getContext('2d');
  skyTex = new THREE.CanvasTexture(skyCanvas);
  redrawSkyGradient();
  const sky = new THREE.Mesh(
    new THREE.SphereGeometry(95, 32, 16),
    new THREE.MeshBasicMaterial({ map:skyTex, side:THREE.BackSide })
  );
  scene.add(sky);

  // ── DRAMATIC SUN WITH RAYS ────────────────────────────────────────────
  const sunC = document.createElement('canvas'); sunC.width=256; sunC.height=256;
  const sc = sunC.getContext('2d');
  // Outer glow
  const sg = sc.createRadialGradient(128,128,6,128,128,128);
  sg.addColorStop(0,   '#ffff66');
  sg.addColorStop(0.18,'#ffee22');
  sg.addColorStop(0.45,'rgba(255,230,50,0.3)');
  sg.addColorStop(0.75,'rgba(255,200,50,0.08)');
  sg.addColorStop(1,   'rgba(255,180,0,0)');
  sc.fillStyle=sg; sc.fillRect(0,0,256,256);
  // Radial sun rays
  for (let ray=0; ray<16; ray++) {
    const angle = (ray/16)*Math.PI*2;
    const gradient = sc.createLinearGradient(
      128 + Math.cos(angle)*20, 128 + Math.sin(angle)*20,
      128 + Math.cos(angle)*118, 128 + Math.sin(angle)*118
    );
    gradient.addColorStop(0, 'rgba(255,240,80,0.35)');
    gradient.addColorStop(1, 'rgba(255,220,50,0)');
    sc.strokeStyle = gradient;
    sc.lineWidth = 5 + Math.random()*4;
    sc.beginPath();

  const sunMesh = new THREE.Mesh(

  // Secondary lens flare circle

    new THREE.MeshBasicMaterial({map:new THREE.CanvasTexture(flareC),transparent:true,depthWrite:false})
  );
  flareMesh.position.set(30,22,-78.5);
  scene.add(flareMesh);

  // ── DETAILED LAYERED CLOUDS ────────────────────────────────────────────
  for (let i=0; i<20; i++) {
    const cg = new THREE.Group();
    const cnt = 4 + Math.floor(Math.random()*5);
    const isLarge = Math.random()>0.5;
    for (let p=0; p<cnt; p++) {

      const puff = new THREE.Mesh(
        new THREE.SphereGeometry(sz, 10, 7),
        new THREE.MeshBasicMaterial({color:0xffffff})
      );
      puff.position.set(p*2.1 - cnt*0.95, rng(-0.5,0.6), rng(-0.5,0.5));
      puff.scale.y = 0.38 + Math.random()*0.22;
      puff.scale.z = 0.55 + Math.random()*0.35;
      cg.add(puff);
    }
    // Cloud underside shadow
    const shadow = new THREE.Mesh(
      new THREE.SphereGeometry(cnt*0.7, 10, 5),
      new THREE.MeshBasicMaterial({color:0xb8c8dc})
    );
    shadow.scale.set(1.0, 0.18, 0.8);
    shadow.position.y = -0.55;
    cg.add(shadow);
    cg.position.set(rng(-78,78), rng(15,30), rng(-82,-12));

  // ── DISTANT HAZE LAYER ────────────────────────────────────────────────
  const hazeC = document.createElement('canvas'); hazeC.width=512; hazeC.height=64;
  const hc = hazeC.getContext('2d');

    new THREE.PlaneGeometry(200, 18),
    new THREE.MeshBasicMaterial({map:new THREE.CanvasTexture(hazeC),transparent:true,depthWrite:false})
  );
  hazeMesh.position.set(0,8,-85);
  scene.add(hazeMesh);
}

function animatePlayer(dt) {
  const runMult = ducking ? 0.5 : 1;
  legT += dt * speed * 0.72 * runMult;
  const s=Math.sin(legT), s2=Math.sin(legT*2);

  if (ducking) {
    playerGroup.scale.set(PLAYER_BASE_SCALE, PLAYER_BASE_SCALE * 0.4, PLAYER_BASE_SCALE);
    playerGroup.position.y = GY + platformY - 0.55;
  } else {
    playerGroup.scale.set(PLAYER_BASE_SCALE, PLAYER_BASE_SCALE, PLAYER_BASE_SCALE);
    playerGroup.position.y = GY + platformY + jumpY;
  }

  if (P.legPL) {
    P.legPL.rotation.x =  s*0.78; P.legPR.rotation.x = -s*0.78;
    P.kneeL.rotation.x = Math.max(0, s)*1.05;
    P.kneeR.rotation.x = Math.max(0,-s)*1.05;
    P.armPL.rotation.x = -s*0.88; P.armPR.rotation.x =  s*0.88;
    P.torso.rotation.z =  s*0.04;
    P.head.position.y  = 2.08 + Math.abs(s2)*0.04;
  }

  bobT += dt*speed*0.55*runMult;
  const shakeX = (Math.random() - 0.5) * cameraShake * 0.08;
  const shakeY = (Math.random() - 0.5) * cameraShake * 0.05;
  cam.position.y = 5.2 + Math.abs(Math.sin(bobT))*0.045*2 - 0.045 + shakeY;
  cam.position.x = playerGroup.position.x*0.18 + laneJolt + shakeX;
  cam.position.z = 11.5 + (Math.random() - 0.5) * cameraShake * 0.04;
}

function triggerArcadePulse(flashColor) {
  const fl = document.getElementById('goal-flash');
  const sc = document.getElementById('score');
  fl.style.background = flashColor;
  setTimeout(() => { fl.style.background = 'rgba(255,215,0,0)'; }, 130);
  sc.style.transform = 'translateX(-50%) scale(1.14)';
  if (scorePulseTO) clearTimeout(scorePulseTO);
  scorePulseTO = setTimeout(() => { sc.style.transform = 'translateX(-50%) scale(1)'; }, 160);
  pickupPulse = Math.min(1.2, pickupPulse + 0.55);
  cameraShake = Math.min(1.0, cameraShake + 0.45);
}

function animateArcadeFX(dt) {
  const waveT = worldZ * 0.75;
  for (const fan of crowdFans) {
    fan.position.y = fan.userData.baseY + Math.sin(waveT + fan.userData.phase) * 0.03;
  }
  for (const f of wavingFlags) {
    f.rotation.y = Math.sin(waveT * 1.1 + f.userData.phase) * 0.32 * f.userData.side;
    f.rotation.z = Math.cos(waveT * 0.9 + f.userData.phase) * 0.08;
  }
  for (const board of pulseBoards) {
    board.scale.y = board.userData.baseScaleY + Math.sin(waveT * 1.4 + board.userData.phase) * 0.05;
  }

  pickupPulse = Math.max(0, pickupPulse - dt * 1.8);
  cameraShake = Math.max(0, cameraShake - dt * 2.4);
  laneJolt *= Math.max(0, 1 - dt * 9);

  const speedLines = document.getElementById('speed-lines');
  const speedFx = Math.max(0, (speed - 14) * 0.03);
  speedLines.style.opacity = alive ? String(Math.min(0.45, speedFx + pickupPulse * 0.28)) : '0';

  const targetFov = baseFov + Math.min(7, (speed - 13) * 0.33) + pickupPulse * 3.2;
  if (Math.abs(cam.fov - targetFov) > 0.01) {
    cam.fov += (targetFov - cam.fov) * 0.14;
    cam.updateProjectionMatrix();
  }
}

function spawnObject() {
  const heavyLocked = heavyObstacleCooldown > 0;
  const r=Math.random();
  let spawnedType = 'none';

  if (heavyLocked) {
    // During cooldown: avoid sequences that require impossible quick combos.
    if      (r<0.16) { spawnBall(); spawnedType='ball'; }
    else if (r<0.24) { spawnCoinLine(); spawnedType='coinline'; }
    else if (r<0.33) { spawnZigzagBalls(); spawnedType='zigzag'; }
    else if (r<0.48) { spawnCone(); spawnedType='cone'; }
    else if (r<0.62) { spawnDoubleCone(); spawnedType='doublecone'; }
    else if (r<0.75) { spawnHurdle(); spawnedType='hurdle'; }
    else if (r<0.86) { spawnBarrier(); spawnedType='barrier'; }
    else if (r<0.95) { spawnConeSlalom(); spawnedType='coneslalom'; }
    else             { spawnBallBonanza(); spawnedType='ballbonanza'; }
  } else {
    if      (r<0.11) { spawnBall(); spawnedType='ball'; }
    else if (r<0.18) { spawnCoinLine(); spawnedType='coinline'; }
    else if (r<0.26) { spawnZigzagBalls(); spawnedType='zigzag'; }
    else if (r<0.35) { spawnCone(); spawnedType='cone'; }
    else if (r<0.43) { spawnConeRow(); spawnedType='conerow'; }
    else if (r<0.51) { spawnBar(); spawnedType='bar'; }
    else if (r<0.59) { spawnHurdle(); spawnedType='hurdle'; }
    else if (r<0.67) { spawnDoubleCone(); spawnedType='doublecone'; }
    else if (r<0.74) { spawnBarrier(); spawnedType='barrier'; }
    else if (r<0.81) { spawnConeSlalom(); spawnedType='coneslalom'; }
    else if (r<0.90) { spawnMovingBar(); spawnedType='movingbar'; }
    else if (r<0.96) { spawnTunnelGap(); spawnedType='tunnel'; }
    else if (r<0.992){ spawnPlatformCombo(); spawnedType='platform'; }
    else             { spawnBallBonanza(); spawnedType='ballbonanza'; }
  }

  if (spawnedType==='bar' || spawnedType==='movingbar' || spawnedType==='tunnel' || spawnedType==='conerow' || spawnedType==='platform') {
    heavyObstacleCooldown = 1.35;
  }
}

function canSpawnNow() {
  // Keep a minimum z-gap between obstacle waves so high speed remains fair.
  const minGap = 10 + Math.max(0, speed - 13) * 0.28;
  let nearestGap = Infinity;
  for (const obj of objects) {
    const type = obj.userData?.type;
    if (!type) continue;
    if (type === 'ball' || type === 'coin') continue;
    const gap = Math.abs(obj.position.z - SPAWN_Z);
    if (gap < nearestGap) nearestGap = gap;
  }
  return nearestGap > minGap;
}

function makeBall(radius) {
  const g = new THREE.Group();
  // Ball sphere
  const b = new THREE.Mesh(new THREE.SphereGeometry(radius, 16, 16), toon(0xf8f8f8));
  b.castShadow = true;
  // Black seam lines
  [0, Math.PI/2, Math.PI/4].forEach(ry => {
    const s = new THREE.Mesh(
      new THREE.TorusGeometry(radius, radius*0.1, 6, 14),
      new THREE.MeshBasicMaterial({color:0x111111})
    );
    s.rotation.y = ry; b.add(s);
  });
  // Pentagon patches
  const pent = new THREE.Mesh(new THREE.CircleGeometry(radius*0.33, 5),
    new THREE.MeshBasicMaterial({color:0x111111}));
  pent.position.z = radius*0.99; b.add(pent);
  const pent2 = pent.clone(); pent2.position.z = -radius*0.99; pent2.rotation.y=Math.PI; b.add(pent2);
  g.add(b);

  // Glow aura sprite (additive blue-white)
  const glowSp = new THREE.Sprite(new THREE.SpriteMaterial({
    map: glowTexWhite, transparent:true, blending:THREE.AdditiveBlending, depthWrite:false, opacity:0.7
  }));
  glowSp.scale.set(radius*5.5, radius*5.5, 1);
  g.add(glowSp);

  // Ground glow circle
  const groundGlowMat = new THREE.MeshBasicMaterial({
    color:0x88aaff, transparent:true, opacity:0.22, depthWrite:false
  });
  const groundGlow = new THREE.Mesh(new THREE.PlaneGeometry(radius*5, radius*5), groundGlowMat);
  groundGlow.rotation.x = -Math.PI/2;
  groundGlow.position.y = -radius + 0.03;
  g.add(groundGlow);

  return g;
}

function spawnBar() {

  const pw = 7.6; // full pitch width
  const ph = 1.72; // crossbar height — duck to pass under
  const postMat = toon(0xf6f6f6);

  // ── LEFT & RIGHT GOAL POSTS ───────────────────────────────────────────
  [-pw/2, pw/2].forEach(px => {
    const post = new THREE.Mesh(new THREE.CylinderGeometry(0.1,0.12,ph,10), postMat);
    post.position.set(px, GY+ph/2, 0);
    post.castShadow = true;
    g.add(post);
    // Gold base anchor
    const base = new THREE.Mesh(new THREE.CylinderGeometry(0.17,0.22,0.12,8), toon(0xFFD700));
    base.position.set(px, GY+0.06, 0); g.add(base);
    // Post top sphere
    const cap = new THREE.Mesh(new THREE.SphereGeometry(0.12,8,6), postMat);

function shootBallToGoal(ball) {
  if (ball.userData._gone) return;
  ball.userData._gone = true;

  const side = (Math.random()<0.5) ? -1 : 1;
  const goalPos = new THREE.Vector3(side*4.2, 1.45, ball.position.z - 50);
  let t=0;
  const start=ball.position.clone();
  const mid=start.clone().lerp(goalPos,0.5);
  mid.y += 3.5;

  const iv=setInterval(()=>{
    t+=0.045;
    const p0=start, p1=mid, p2=goalPos;
    const u=1-t;
    ball.position.set(
      u*u*p0.x + 2*u*t*p1.x + t*t*p2.x,
      u*u*p0.y + 2*u*t*p1.y + t*t*p2.y,
      u*u*p0.z + 2*u*t*p1.z + t*t*p2.z
    );
    ball.rotation.x+=0.18; ball.rotation.z+=0.08;
    ball.scale.setScalar(Math.max(0.05,1-t*0.5));
    if(t>=1){
      clearInterval(iv);
      scene.remove(ball); objects=objects.filter(o=>o!==ball);
      showGoalFlash();
    }
  },16);
}

function scrollTiles(dt) {
  const dz=speed*dt;
  gTiles.forEach(t=>{
    t.position.z+=dz;
    if(t.position.z>PZ+TILE_LEN) t.position.z-=TILE_CNT*TILE_LEN;
  });
  [...sideTiles.L,...sideTiles.R].forEach(t=>{
    t.position.z+=dz;
    if(t.position.z>PZ+TILE_LEN) t.position.z-=TILE_CNT*TILE_LEN;
  });
  goalObjects.L.position.z+=dz;
  goalObjects.R.position.z+=dz;
  if(goalObjects.L.position.z > PZ+8) {
    goalObjects.L.position.z = GOAL_Z_BASE;
    goalObjects.R.position.z = GOAL_Z_BASE;
  }
}

function updateGame(dt) {
  if (!alive) return;

  const px=playerGroup.position.x;

  let onPlatform=false, activePlatformY=0;
  for(const obj of objects){
    if(obj.userData.type==='platform' && obj.userData.lane===lane){
      const dz=Math.abs(obj.position.z - PZ);
      if(dz < obj.userData.platLen/2 + 0.5){
        onPlatform=true;
        activePlatformY=obj.userData.topY;
      }
    }
  }

  const targetPlatY = onPlatform ? activePlatformY : 0;
  platformY += (targetPlatY - platformY) * 0.25;
  if(!onPlatform && platformY < 0.05) platformY=0;
  heavyObstacleCooldown = Math.max(0, heavyObstacleCooldown - dt);

  if(!grounded){
    jumpVY-=26*dt; jumpY+=jumpVY*dt;
    if(jumpY<=0){ jumpY=0; jumpVY=0; grounded=true; }
  }

  playerGroup.position.x+=(targetX-playerGroup.position.x)*0.23;
  animatePlayer(dt);
  scrollTiles(dt);

  worldZ+=speed*dt;
  applyThemeProgression(dt);
  animateArcadeFX(dt);
  updatePickupParticles(dt);

  // Smooth spawn interval by speed (no extreme compression at high speed).
  const targetSpawnInt = Math.max(0.9, 1.05 - Math.max(0, speed - 13) * 0.005);
  spawnInt += (targetSpawnInt - spawnInt) * 0.12;

  spawnTimer+=dt;
  if(spawnTimer>=spawnInt && canSpawnNow()){
    spawnTimer=0; spawnObject();
    if(speed<30) speed+=0.18;
  }

  const playerTopStand = GY+platformY+jumpY+1.72;
  const playerTopDuck  = GY+platformY+jumpY+0.7;
  const playerTop = ducking ? playerTopDuck : playerTopStand;
  const playerBottom = GY+platformY+jumpY;
  const toRemove=[];

  for(const obj of objects){
    obj.position.z+=speed*dt;

    const dz=Math.abs(obj.position.z-PZ);
    const dx=Math.abs(obj.position.x-px);

    if(obj.userData.type==='ball'){
      obj.rotation.y+=dt*2.2;
      if(dz<0.85 && dx<0.85) {
        spawnPickupBurst(obj.position.x, obj.position.y+0.3, obj.position.z, glowTexWhite, 12);
        shootBallToGoal(obj);
      }
    }

    if(obj.userData.type==='coin'){
      obj.rotation.y+=dt*3.5;
      if(dz<0.6 && dx<0.55){
        score+=5; document.getElementById('score').textContent='🏆 '+score;
        spawnPickupBurst(obj.position.x, obj.position.y, obj.position.z, glowTexGold, 10);
        triggerArcadePulse('rgba(120,255,220,0.28)');
        scene.remove(obj); toRemove.push(obj); continue;
      }
    }

    if(obj.userData.type==='cone'){
      if(dz<0.55 && dx<0.6){
        if(jumpY<0.5 && platformY<0.3 && !ducking){ triggerGameOver(); return; }
      }
    }

    if(obj.userData.type==='bar'){
      if(dz<0.55){ if(playerTop>obj.userData.beamY-obj.userData.beamHH){ triggerGameOver(); return; } }
    }

    if(obj.userData.type==='movingbar'){
      const phase=obj.userData.phase||0;
      const osc=Math.sin(worldZ*0.12+phase)*0.55;
      const currentBeamY=obj.userData.beamY+osc;
      obj.children.forEach(c=>{ if(c.userData?.isMovingBeam) c.position.y=currentBeamY; });
      if(dz<0.55){ if(playerTop>currentBeamY-obj.userData.beamHH){ triggerGameOver(); return; } }
    }

    if(obj.userData.type==='hurdle'||obj.userData.type==='barrier'){
      if(dz<0.55 && dx<0.85){
        const bY=obj.userData.beamY??GY+1.35;
        const bHH=obj.userData.beamHH??0.65;
        if(playerBottom<bY && playerTop>bY-bHH){ triggerGameOver(); return; }
      }
    }

    if(obj.userData.type==='solidwall'){
      if(dz<0.6 && dx<0.9){
        triggerGameOver(); return;
      }
    }

    if(obj.position.z>DESPAWN_Z) toRemove.push(obj);
  }

  for(const obj of toRemove){
    scene.remove(obj); objects=objects.filter(o=>o!==obj);
  }
}

function shiftLane(d){
  if(!alive)return;
  lane=Math.max(0,Math.min(2,lane+d));
  targetX=LANES[lane];
  laneJolt += d * 0.22;
  cameraShake = Math.min(1, cameraShake + 0.12);
}
function doJump(){
  if((!grounded && platformY<0.1)||ducking||!alive)return;
  grounded=false; jumpY=0; jumpVY=12;
  cameraShake = Math.min(1, cameraShake + 0.15);
}
function doDuck(){
  if(!alive)return;
  ducking=true;
  if(duckTO)clearTimeout(duckTO);
  duckTO=setTimeout(()=>{ducking=false;},500);
}
function onKey(e){
  if(!alive)return;
  if(e.key==='ArrowLeft'){e.preventDefault();shiftLane(-1);}
  if(e.key==='ArrowRight'){e.preventDefault();shiftLane(1);}
  if(e.key==='ArrowUp'||e.key===' '){e.preventDefault();doJump();}
  if(e.key==='ArrowDown'){e.preventDefault();doDuck();}
}

function triggerGameOver(){
  alive=false; cancelAnimationFrame(raf);
  document.getElementById('fs').textContent='🏆 '+score+' guld! ('+goals+' mål)';
  document.getElementById('overlay').classList.add('show');
  document.getElementById('speed-lines').style.opacity='0';
}
function startGame()  { document.getElementById('start-screen').style.display='none'; reset(); }
function restartGame(){ document.getElementById('overlay').classList.remove('show'); reset(); }
function reset(){
  for(const o of objects) scene.remove(o);
  objects=[];
  lane=1; targetX=LANES[1];
  speed=13; spawnTimer=0; spawnInt=1.05;
  score=0; goals=0; worldZ=0; alive=true;
  jumpY=0; jumpVY=0; grounded=true; ducking=false;
  platformY=0; legT=0; bobT=0; heavyObstacleCooldown=0;
  playerGroup.position.set(LANES[1],GY,PZ);
  playerGroup.scale.set(PLAYER_BASE_SCALE,PLAYER_BASE_SCALE,PLAYER_BASE_SCALE);
  document.getElementById('score').textContent='🏆 0';
  resetCam(); lastT=0;
  cancelAnimationFrame(raf); loop(0);
}
function loop(t){
  raf=requestAnimationFrame(loop);
  const dt=Math.min((t-lastT)/1000,0.05); lastT=t;
  updateGame(dt);
  renderer.render(scene,cam);
}
function onResize(){
  cam.aspect=innerWidth/innerHeight;
  cam.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
}

if ('serviceWorker' in navigator && (isSecureContext || location.hostname === 'localhost')) {
  addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}

init();
</script>
</body>
</html>
